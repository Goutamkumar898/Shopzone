# ── Server ──────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── Database ─────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Goutam
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ── KEY FIX: run data.sql AFTER Hibernate creates tables ──
spring.jpa.defer-datasource-initialization=true

# ── SQL Init ─────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ── JWT ───────────────────────────────────────────
app.jwt.secret=ecommerce_super_secret_key_change_in_production_min_256_bits
app.jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Logging ──────────────────────────────────────
logging.level.com.ecommerce=DEBUG
logging.level.org.hibernate.SQL=DEBUG
